<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneClick Clothing Prototype</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
}

/* HEADER */

header{
background:#000;
color:#fff;
padding:16px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:bold;
}

nav a{
color:white;
margin-right:20px;
text-decoration:none;
font-size:14px;
}

/* PRODUCT GRID */

.container{
padding:30px 40px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:24px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.info{
padding:12px;
}

.brand{
font-size:12px;
color:#888;
}

.product{
font-size:14px;
margin-top:4px;
}

.price{
font-weight:bold;
margin-top:6px;
}

/* DETAIL */

.detail{
display:none;
padding:40px;
}

.detail-wrapper{
display:grid;
grid-template-columns:1fr 420px;
gap:40px;
}

.main-image img{
width:100%;
max-width:600px;
border-radius:10px;
}

.buy-btn{
margin-top:20px;
background:black;
color:white;
padding:14px;
border:none;
width:100%;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.back{
margin-bottom:20px;
cursor:pointer;
color:#555;
}

/* REVIEW */

.review{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:15px;
text-align:center;
max-width:600px;
margin-left:auto;
margin-right:auto;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
}

</style>
</head>

<body>

<header>
<div class="logo">ONECLICK</div>
<nav>
<a href="#">MEN</a>
<a href="#">OUTER</a>
<a href="#">TOP</a>
<a href="#">PANTS</a>
</nav>
</header>


<!-- PRODUCT LIST -->

<div class="container" id="list"></div>


<!-- DETAIL PAGE -->

<div class="detail" id="detail">

<div class="back" onclick="back()">← 상품 목록</div>

<div class="detail-wrapper">

<div class="main-image">
<img id="mainImg">
</div>

<div>

<h2 id="detailName"></h2>
<p id="detailBrand" style="color:#888"></p>
<h3 id="detailPrice"></h3>

<button class="buy-btn" onclick="buy()">구매하기</button>

</div>

</div>


<!-- REVIEW -->

<div style="margin-top:60px">

<h3 style="text-align:center">사용자 리뷰</h3>

<div class="review">
<b>김OO</b> ⭐⭐⭐⭐⭐
<p>사이즈 고민 없이 바로 구매할 수 있어서 편했습니다.</p>
</div>

<div class="review">
<b>박OO</b> ⭐⭐⭐⭐
<p>AI 추천 사이즈로 주문했는데 핏이 좋네요.</p>
</div>

<div class="review">
<b>이OO</b> ⭐⭐⭐⭐⭐
<p>반품 고민이 없어서 좋습니다.</p>
</div>

</div>

</div>


<!-- MODAL -->

<div class="modal" id="modal">
<div class="modal-box">
<h2>구매 완료</h2>
<p>사이즈 교환은 1회 무료입니다.</p>
<button onclick="closeModal()">닫기</button>
</div>
</div>


<script>

const products = [

{brand:"HYOGI",name:"Essential Round Cardigan",price:"48,750원",img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"},
{brand:"INSPIRE",name:"Oversized Hoodie",price:"59,000원",img:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
{brand:"URBAN",name:"Classic Denim Jacket",price:"79,000원",img:"https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb"},
{brand:"MODERN",name:"Minimal Long Coat",price:"129,000원",img:"https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"},
{brand:"DAILY",name:"Loose Fit Knit",price:"45,000원",img:"https://images.unsplash.com/photo-1516826957135-700dedea698c"},
{brand:"STREET",name:"Relaxed Sweatshirt",price:"52,000원",img:"https://images.unsplash.com/photo-1523381210434-271e8be1f52b"},
{brand:"URBAN",name:"Slim Fit Jacket",price:"98,000원",img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"},
{brand:"CASUAL",name:"Relaxed Pants",price:"63,000원",img:"https://images.unsplash.com/photo-1520975661595-6453be3f7070"},
{brand:"ESSENTIAL",name:"Basic Knit",price:"39,000원",img:"https://images.unsplash.com/photo-1490481651871-ab68de25d43d"},
{brand:"MINIMAL",name:"Black Blazer",price:"119,000원",img:"https://images.unsplash.com/photo-1552374196-c4e7ffc6e126"},
{brand:"CASUAL",name:"Classic Shirt",price:"42,000원",img:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246"}

]

document.addEventListener("DOMContentLoaded",()=>{

const list = document.getElementById("list")

products.forEach((p,i)=>{

const card = `
<div class="card" onclick="openDetail(${i})">
<img src="${p.img}">
<div class="info">
<div class="brand">${p.brand}</div>
<div class="product">${p.name}</div>
<div class="price">${p.price}</div>
</div>
</div>
`

list.insertAdjacentHTML("beforeend",card)

})

})

function openDetail(i){

const p = products[i]

document.getElementById("mainImg").src = p.img
document.getElementById("detailName").innerText = p.name
document.getElementById("detailBrand").innerText = p.brand
document.getElementById("detailPrice").innerText = p.price

document.getElementById("list").style.display="none"
document.getElementById("detail").style.display="block"

}

function back(){

document.getElementById("detail").style.display="none"
document.getElementById("list").style.display="grid"

}

function buy(){

document.getElementById("modal").style.display="flex"

}

function closeModal(){

document.getElementById("modal").style.display="none"

}

</script>

</body>
</html>
